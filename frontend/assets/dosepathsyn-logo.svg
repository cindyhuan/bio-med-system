<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DOSEPATHSYN targeted oncology logo</title>
  <desc id="desc">Blue circular oncology logo with tumor targeting crosshair, drug capsule and dose particles.</desc>
  <defs>
    <radialGradient id="discGrad" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#075aa3"/>
      <stop offset="58%" stop-color="#06346c"/>
      <stop offset="100%" stop-color="#041d46"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="67" y1="84" x2="339" y2="348" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d64e8"/>
      <stop offset="0.48" stop-color="#119be9"/>
      <stop offset="1" stop-color="#23d5e3"/>
    </linearGradient>
    <linearGradient id="swooshGrad" x1="170" y1="278" x2="320" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#084bcd" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#1497f3"/>
      <stop offset="1" stop-color="#9ef9ff"/>
    </linearGradient>
    <radialGradient id="tumorGrad" cx="53%" cy="48%" r="56%">
      <stop offset="0%" stop-color="#e5fbff"/>
      <stop offset="20%" stop-color="#1697f3"/>
      <stop offset="62%" stop-color="#0b61d9"/>
      <stop offset="100%" stop-color="#083783"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.04 0 0 0 0 0.58 0 0 0 0 1 0 0 0 0.42 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-22%" y="-22%" width="144%" height="144%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#083a7a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <circle cx="210" cy="210" r="140" fill="url(#discGrad)" filter="url(#shadow)"/>
  <circle cx="210" cy="210" r="151" fill="none" stroke="#ffffff" stroke-width="11"/>
  <path d="M83 209A127 127 0 01209 83" fill="none" stroke="url(#ringGrad)" stroke-width="15" stroke-linecap="butt"/>
  <path d="M222 83a127 127 0 01115 126" fill="none" stroke="url(#ringGrad)" stroke-width="15" stroke-linecap="butt"/>
  <path d="M337 222a127 127 0 01-115 115" fill="none" stroke="url(#ringGrad)" stroke-width="15" stroke-linecap="butt"/>
  <path d="M209 337A127 127 0 0183 222" fill="none" stroke="url(#ringGrad)" stroke-width="15" stroke-linecap="butt"/>

