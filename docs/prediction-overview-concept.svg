<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">预测总览改版概念图</title>
  <desc id="desc">A concept mockup for a scientific and technology-focused prediction overview page.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef5f8"/>
      <stop offset="1" stop-color="#dcebf1"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0b2540"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#0e9fbc"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#15324a" flood-opacity="0.14"/>
    </filter>
    <style>
      .font { font-family: Arial, "Microsoft YaHei", sans-serif; }
      .card { fill: #ffffff; stroke: #d5e3ea; stroke-width: 1.4; filter: url(#shadow); }
      .small { font-size: 22px; fill: #64748b; font-weight: 700; }
      .label { font-size: 26px; fill: #102033; font-weight: 800; }
      .num { font-size: 54px; fill: #0b2540; font-weight: 900; }
      .tiny { font-size: 18px; fill: #64748b; font-weight: 700; }
      .pill { fill: #e7fbf7; stroke: #b7e8df; stroke-width: 1; }
      .pillText { font-size: 20px; fill: #0f766e; font-weight: 800; }
      .mutedLine { stroke: #d7e2ea; stroke-width: 2; }
      .barBg { fill: #edf4f7; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <path d="M1100 80c76 38 88 96 34 147-55 52-49 111 19 179" fill="none" stroke="#9edee8" stroke-width="18" stroke-linecap="round" opacity="0.26"/>
  <path d="M1230 60c-72 48-76 105-12 170 64 64 57 131-21 199" fill="none" stroke="#69c7d7" stroke-width="15" stroke-linecap="round" opacity="0.20"/>
  <circle cx="1265" cy="190" r="9" fill="#60c8d5" opacity="0.35"/>
  <circle cx="1165" cy="365" r="13" fill="#0e9fbc" opacity="0.28"/>

  <text x="54" y="66" class="font" font-size="36" fill="#0b2540" font-weight="900">预测总览改版概念图</text>
  <text x="54" y="102" class="font" font-size="22" fill="#64748b" font-weight="700">把“分数列表”升级为：响应强度、证据链、剂量交互、结构贡献和机制线索的综合科研看板</text>

  <rect x="54" y="135" width="392" height="540" rx="16" class="card"/>
  <text x="86" y="184" class="font label">联合治疗响应预测</text>
  <text x="86" y="218" class="font small">主结果以响应仪表盘呈现</text>
  <circle cx="250" cy="360" r="126" fill="#f7fbfd" stroke="#d7e2ea" stroke-width="18"/>
  <path d="M163 451a126 126 0 1 1 202 -148" fill="none" stroke="url(#teal)" stroke-width="20" stroke-linecap="round"/>
  <circle cx="250" cy="360" r="86" fill="#ffffff" stroke="#d7e2ea" stroke-width="2"/>
  <text x="250" y="348" text-anchor="middle" class="font" font-size="22" fill="#64748b" font-weight="800">综合响应</text>
  <text x="250" y="409" text-anchor="middle" class="font" font-size="74" fill="#0b2540" font-weight="900">0.73</text>
  <rect x="133" y="458" width="234" height="46" rx="23" fill="#e7fbf7" stroke="#a7e5da"/>
  <text x="250" y="488" text-anchor="middle" class="font" font-size="24" fill="#0f766e" font-weight="900">中等偏高响应</text>
  <text x="86" y="560" class="font small">数据覆盖可信度</text>
  <rect x="86" y="584" width="300" height="18" rx="9" class="barBg"/>
  <rect x="86" y="584" width="258" height="18" rx="9" fill="url(#teal)"/>
  <text x="402" y="603" text-anchor="end" class="font" font-size="24" fill="#0f766e" font-weight="900">86%</text>
  <text x="86" y="638" class="font tiny">结论卡采用动态计数、呼吸高亮和可信度进度条。</text>

  <rect x="474" y="135" width="410" height="166" rx="16" class="card"/>
  <text x="506" y="184" class="font label">剂量依赖交互评分</text>
  <text x="506" y="218" class="font small">展示当前组合是否存在剂量协同趋势</text>
  <text x="506" y="272" class="font num">0.41</text>
  <g transform="translate(676 184)">
    <rect x="0" y="0" width="154" height="86" rx="8" fill="#f8fbfd" stroke="#d7e2ea"/>
    <rect x="10" y="10" width="30" height="20" fill="#cde7ee"/>
    <rect x="44" y="10" width="30" height="20" fill="#99d2dc"/>
    <rect x="78" y="10" width="30" height="20" fill="#4fb7c8"/>
    <rect x="112" y="10" width="30" height="20" fill="#16a34a"/>
    <rect x="10" y="34" width="30" height="20" fill="#e6f4f7"/>
    <rect x="44" y="34" width="30" height="20" fill="#b9dde5"/>
    <rect x="78" y="34" width="30" height="20" fill="#0e9fbc"/>
    <rect x="112" y="34" width="30" height="20" fill="#f59e0b"/>
    <rect x="10" y="58" width="30" height="18" fill="#eef5f8"/>
    <rect x="44" y="58" width="30" height="18" fill="#9bd6de"/>
    <rect x="78" y="58" width="30" height="18" fill="#16a34a"/>
    <rect x="112" y="58" width="30" height="18" fill="#dc2626"/>
    <circle cx="96" cy="44" r="8" fill="#ffffff" stroke="#0b2540" stroke-width="4"/>
  </g>

  <rect x="914" y="135" width="432" height="166" rx="16" class="card"/>
  <text x="946" y="184" class="font label">证据链摘要</text>
  <text x="946" y="218" class="font small">把模型结果解释成可读的科研判断</text>
  <rect x="946" y="242" width="118" height="38" rx="19" class="pill"/>
  <text x="1005" y="268" text-anchor="middle" class="font pillText">低外推风险</text>
  <rect x="1078" y="242" width="122" height="38" rx="19" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="1139" y="268" text-anchor="middle" class="font" font-size="20" fill="#d97706" font-weight="800">建议验证</text>
  <rect x="1214" y="242" width="102" height="38" rx="19" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="1265" y="268" text-anchor="middle" class="font" font-size="20" fill="#2563eb" font-weight="800">可追溯</text>

  <rect x="474" y="330" width="410" height="260" rx="16" class="card"/>
  <text x="506" y="379" class="font label">药物相对作用贡献</text>
  <text x="506" y="413" class="font small">用动态横向条形图替代静态文本</text>
  <text x="506" y="467" class="font small">药物 A</text>
  <rect x="606" y="446" width="214" height="26" rx="13" class="barBg"/>
  <rect x="606" y="446" width="128" height="26" rx="13" fill="#0e9fbc"/>
  <text x="840" y="468" class="font" font-size="22" fill="#0e9fbc" font-weight="900">42%</text>
  <text x="506" y="526" class="font small">药物 B</text>
  <rect x="606" y="505" width="214" height="26" rx="13" class="barBg"/>
  <rect x="606" y="505" width="172" height="26" rx="13" fill="#f59e0b"/>
  <text x="840" y="527" class="font" font-size="22" fill="#d97706" font-weight="900">58%</text>
  <path d="M522 562c52-34 98-30 142-8 47 24 89 20 148-26" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" opacity="0.55"/>

  <rect x="914" y="330" width="432" height="260" rx="16" class="card"/>
  <text x="946" y="379" class="font label">机制线索网络</text>
  <text x="946" y="413" class="font small">用小型网络图承接通路机制页</text>
  <g transform="translate(974 448)">
    <line x1="80" y1="40" x2="185" y2="18" stroke="#9ecbd4" stroke-width="4"/>
    <line x1="80" y1="40" x2="207" y2="96" stroke="#9ecbd4" stroke-width="4"/>
    <line x1="185" y1="18" x2="286" y2="52" stroke="#9ecbd4" stroke-width="4"/>
    <line x1="207" y1="96" x2="286" y2="52" stroke="#9ecbd4" stroke-width="4"/>
    <circle cx="80" cy="40" r="28" fill="#0e9fbc"/>
    <circle cx="185" cy="18" r="22" fill="#16a34a"/>
    <circle cx="207" cy="96" r="24" fill="#f59e0b"/>
    <circle cx="286" cy="52" r="31" fill="#0b2540"/>
    <text x="80" y="46" text-anchor="middle" class="font" font-size="16" fill="#fff" font-weight="900">转录</text>
    <text x="185" y="24" text-anchor="middle" class="font" font-size="16" fill="#fff" font-weight="900">缺氧</text>
    <text x="207" y="102" text-anchor="middle" class="font" font-size="16" fill="#fff" font-weight="900">凋亡</text>
    <text x="286" y="58" text-anchor="middle" class="font" font-size="16" fill="#fff" font-weight="900">响应</text>
  </g>

  <rect x="54" y="710" width="1292" height="124" rx="16" class="card"/>
  <text x="86" y="758" class="font label">交互与动效建议</text>
  <text x="86" y="796" class="font small">1. 分析完成后数值从 0 动态计数到预测值；2. 贡献条逐步展开；3. 当前剂量点在小热图中闪烁一次；4. 悬浮指标卡显示“数据来源、含义、边界”；5. 风险提示用黄/红标签固定在结果旁。</text>
</svg>
